<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloomrix</title>
    <script>
      // Fix for environments where window.fetch is a getter-only property
      // and libraries (like socket.io or polyfills) try to overwrite it.
      (function() {
        try {
          var f = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return f; },
            set: function(v) { f = v; }
          });
        } catch (e) {
          console.warn('Could not apply window.fetch fix:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
